name: OCI Instance Watcher

on:
  schedule:
    - cron: '*/5 * * * *'   # every 5 min (GitHub Actions minimum)
  workflow_dispatch:          # allow manual trigger -
concurrency:
    group: oci-watcher
    cancel-in-progress: true

concurrency:
  group: oci-watcher
  cancel-in-progress: true   # new run cancels old one if still running

jobs:
  try-create:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install dependencies
        run: composer install --no-dev --no-interaction --prefer-dist

      - name: Write OCI private key
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > /tmp/oci_key.pem
          chmod 600 /tmp/oci_key.pem

      - name: Run watcher (4 attempts × 50s)
        id: watcher
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: /tmp/oci_key.pem
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}
          OCI_SHAPE: VM.Standard.A1.Flex
          OCI_OCPUS: 2
          OCI_MEMORY_IN_GBS: 12
          OCI_MAX_INSTANCES: 1
          OCI_AVAILABILITY_DOMAIN: ""
          CACHE_AVAILABILITY_DOMAINS: 1
          OCI_BOOT_VOLUME_SIZE_IN_GBS: 200
        run: |
          # Strip newlines from SSH key (common copy-paste issue)
          export OCI_SSH_PUBLIC_KEY=$(echo "$OCI_SSH_PUBLIC_KEY" | tr -d '\n\r')

          for i in 1 2 3 4; do
            echo "=== Attempt $i ==="
            OUTPUT=$(php index.php 2>&1)
            echo "$OUTPUT"
            # Success: response contains lifecycleState (instance was created)
            if echo "$OUTPUT" | grep -q '"lifecycleState"'; then
              echo "✅ SUCCESS - instance created!"
              # Save output for email notification (escape newlines)
              SAFE_OUTPUT=$(echo "$OUTPUT" | head -50 | tr '\n' '|')
              echo "instance_created=true" >> $GITHUB_OUTPUT
              echo "instance_output=$SAFE_OUTPUT" >> $GITHUB_OUTPUT
              exit 0
            fi
            [ $i -lt 4 ] && sleep 50
          done
          echo "instance_created=false" >> $GITHUB_OUTPUT
          echo "No capacity this round, will retry in 5 min"

      - name: Send email notification
        if: steps.watcher.outputs.instance_created == 'true'
        uses: dawidd6/action-send-mail@v17
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "✅ OCI ARM VM 搶到了！"
          to: ryandotcheng@gmail.com
          from: OCI Watcher <${{ secrets.MAIL_USERNAME }}>
          body: |
            🎉 Oracle Cloud ARM A1 VM 建立成功！

            規格：VM.Standard.A1.Flex | 2 OCPU | 12 GB RAM | 200 GB Storage
            Region：US West
            時間：${{ github.run_started_at }}

            請前往 OCI Console 指派 Public IP：
            https://cloud.oracle.com/compute/instances

            --- API 回應（前 50 行）---
            ${{ steps.watcher.outputs.instance_output }}
